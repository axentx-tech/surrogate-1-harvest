name: Hermes Cron Dispatcher

# Replaces the dead Mac hermes-gateway daemon (stopped 2026-04-27).
# Runs every 5 min — dispatcher reads data/hermes-jobs.json, picks jobs whose
# cron expression matches the current minute, and executes them.
#
# 165 hermes-cron jobs migrated from ~/.hermes/cron/jobs.json (Mac).
# Free tier budget: ~280 dispatcher minutes / day → fits in 2,000-min monthly.

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 min
  workflow_dispatch:

concurrency:
  group: hermes-cron
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dispatcher
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 bin/hermes-cron-dispatcher.py

      - name: Commit last-run state back
        if: always()
        run: |
          git config user.email "hermes-cron@axentx.local"
          git config user.name "hermes-cron-dispatcher"
          git add data/hermes-last-run.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "hermes-cron tick $(date -u +%Y-%m-%dT%H:%M:%SZ)" -q
          git push origin main 2>&1 | tail -3 || true
