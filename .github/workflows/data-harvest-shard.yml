# Data harvest shard — runs as a GitHub Actions workflow on each
# codespace-eligible account's fork of this repo.
#
# Each forked account contributes 2000 free CI min/mo. With 7 accounts
# we have 14,000 min/mo of free harvest compute on top of the GCP +
# Kamatera + codespace fleet.
#
# Sharding: each fork hashes its account name modulo SHARD_COUNT so two
# accounts never pull the same dataset offset window. The cf-worker's
# /mirror/lease route is the SOURCE OF TRUTH on cursors — Actions just
# claim a lease, fetch a chunk, advance the cursor, and exit.
#
# Schedule: every 30 min. Free GitHub Actions runner is x86 Ubuntu 22.04,
# fast enough to push ~2000 pairs per 5-min run.
#
# Secrets required per fork:
#   HF_TOKEN                  HF token (read; write only on the primary)
#   HARVEST_WORKER_URL        e.g. https://surrogate-1-cursor.ashira.workers.dev
#   PUSH_TOKEN                (optional) HF token with write to push pairs back

name: data-harvest-shard

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:           # manual trigger
    inputs:
      duration_min:
        description: 'Run duration cap in minutes'
        default: '4'

permissions:
  contents: read
  id-token: write              # for OIDC if we ever federate

concurrency:
  group: data-harvest-shard
  cancel-in-progress: false    # let the previous one finish first

jobs:
  shard:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HARVEST_WORKER_URL: ${{ secrets.HARVEST_WORKER_URL }}
      MIRROR_WORKERS: '4'
      MIRROR_PER_BATCH: '300'
      DURATION_MIN: ${{ inputs.duration_min || '4' }}
      # Account-specific worker id so the heartbeat dashboard can tell
      # them apart across the 7 forks.
      WORKER_ID: gh-actions/${{ github.repository_owner }}
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip --quiet
          pip install --quiet -r requirements.txt

      - name: Sanity check — worker reachable
        run: |
          test -n "$HARVEST_WORKER_URL" || { echo "::error::HARVEST_WORKER_URL secret missing"; exit 1; }
          test -n "$HF_TOKEN" || { echo "::error::HF_TOKEN secret missing"; exit 1; }
          curl -sSf -m 8 "$HARVEST_WORKER_URL/mirror/stats" -o /dev/null
          echo "worker ok"

      - name: Run streaming mirror for $DURATION_MIN minutes
        run: |
          # Cap by SIGTERM so we don't go past the cron window
          (sleep $((DURATION_MIN * 60)) && pkill -TERM -f axentx-dataset-mirror) &
          export REPO_ROOT="$GITHUB_WORKSPACE"
          export HOME=/tmp
          mkdir -p state
          python bin/axentx-dataset-mirror-daemon.py || true
          echo ""
          echo "=== Final mirror_cursors snapshot ==="
          curl -sSf "$HARVEST_WORKER_URL/mirror/stats" | python -m json.tool | head -30

      - name: Report summary
        if: always()
        run: |
          echo "## $WORKER_ID — $DURATION_MIN min run" >> "$GITHUB_STEP_SUMMARY"
          if [ -f state/training-pairs.jsonl ]; then
            wc -l state/training-pairs.jsonl >> "$GITHUB_STEP_SUMMARY"
            du -h state/training-pairs.jsonl >> "$GITHUB_STEP_SUMMARY"
          fi
          curl -sSf "$HARVEST_WORKER_URL/mirror/stats" \
            | python -c "import sys,json; d=json.load(sys.stdin); t=d['totals']; print(f\"sources={t['sources']} rows={t['total_rows']} exhausted={t['exhausted_count']}\")" \
            >> "$GITHUB_STEP_SUMMARY"
